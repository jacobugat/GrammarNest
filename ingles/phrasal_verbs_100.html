<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
<title>100 Phrasal Verbs</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --card:#22263a; --border:#2e3350;
    --accent:#7c6af7; --accent2:#4ecdc4; --text:#e8eaf0; --muted:#8891a8;
    --success:#3dd68c; --pill-bg:#2a2f4a; --radius:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  header h1{font-size:1.2rem;font-weight:700;}
  header h1 span{color:var(--accent);}
  .header-count{font-size:.85rem;color:var(--muted);background:var(--pill-bg);padding:4px 12px;border-radius:20px;}

  .tabs{display:flex;gap:8px;padding:20px 24px 0;border-bottom:1px solid var(--border);}
  .tab{padding:10px 22px;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--muted);font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:-1px;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab:hover:not(.active){color:var(--text);}

  .search-wrap{padding:20px 24px 4px;}
  .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s;}
  .search-wrap input:focus{border-color:var(--accent);}
  .search-wrap input::placeholder{color:var(--muted);}

  #view-list{padding:16px 24px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;}
  .verb-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:border-color .2s,transform .15s;}
  .verb-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .verb-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
  .verb-num{font-size:.82rem;color:var(--muted);background:var(--pill-bg);padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap;margin-top:3px;}
  .verb-name{font-size:1.35rem;font-weight:700;color:var(--accent);flex:1;}
  .verb-trans{font-size:1.05rem;color:var(--accent2);margin-bottom:10px;font-style:italic;}
  .verb-example{font-size:1rem;color:var(--text);line-height:1.5;border-left:3px solid var(--accent);padding-left:10px;}
  .verb-example-es{font-size:.95rem;color:var(--muted);padding-left:13px;margin-top:4px;}

  /* FLASHCARD */
  #view-flash{display:none;flex-direction:column;align-items:center;padding:28px 24px 60px;min-height:80vh;}

  .audio-panel{width:100%;max-width:600px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 22px;margin-top:28px;display:flex;flex-direction:column;gap:14px;}
  .audio-panel-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .audio-label{font-size:.9rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;min-width:80px;}
  .audio-btns{display:flex;gap:8px;}
  .abtn{width:40px;height:40px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .abtn:hover{border-color:var(--accent);color:var(--accent);}
  .abtn-play{width:44px;height:44px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .abtn-play:hover{background:#9585ff;transform:scale(1.05);}
  .rep-info{font-size:.95rem;color:var(--accent2);font-weight:600;}
  select.audio-select{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 10px;font-size:.8rem;outline:none;cursor:pointer;flex:1;min-width:0;}
  input[type=range].speed-range{accent-color:var(--accent);cursor:pointer;width:120px;}
  .speed-val{font-size:.95rem;color:var(--accent);font-weight:700;min-width:34px;}

  .flash-meta{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .flash-meta span{font-size:1rem;color:var(--muted);background:var(--pill-bg);padding:5px 14px;border-radius:20px;}
  .rep-badge{color:var(--accent2)!important;font-weight:700;}

  .flash-progress-bar{width:100%;max-width:600px;height:4px;background:var(--border);border-radius:4px;margin-bottom:24px;overflow:hidden;}
  .flash-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s ease;width:0%;}

  /* Tarjeta única (sin flip) */
  .fc-card{
    width:100%;max-width:580px;
    background:linear-gradient(135deg,#1e2240 0%,#252b4a 100%);
    border:1px solid var(--border);
    border-radius:20px;
    padding:44px 40px;
    text-align:center;
    margin-bottom:28px;
    display:flex;flex-direction:column;align-items:center;gap:14px;
    min-height:220px;justify-content:center;
  }
  .card-hint{font-size:.88rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;}
  .card-verb{font-size:3.2rem;font-weight:800;color:var(--accent);line-height:1.1;letter-spacing:-1px;}
  .card-divider{width:60px;height:2px;background:var(--border);border-radius:2px;}
  .card-translation{font-size:2rem;font-weight:600;color:var(--accent2);}
  .card-num-badge{font-size:.92rem;color:var(--muted);margin-top:4px;}
  .card-rep-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
  .rep-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s;}
  .rep-dot.done{background:var(--accent2);}

  .flash-controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .btn{padding:11px 26px;border-radius:10px;border:none;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#9585ff;}
  .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
  .btn-icon{padding:11px 15px;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:1rem;transition:all .2s;}
  .btn-icon:hover{border-color:var(--accent);color:var(--accent);}

  .toggle-label{font-size:.85rem;color:var(--muted);}
  .toggle{position:relative;width:44px;height:24px;cursor:pointer;}
  .toggle input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:var(--border);border-radius:24px;transition:.3s;}
  .slider:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:var(--muted);border-radius:50%;transition:.3s;}
  .toggle input:checked+.slider{background:var(--accent);}
  .toggle input:checked+.slider:before{transform:translateX(20px);background:white;}

  .hidden{display:none!important;}
  #view-list:not(.hidden){display:grid;}
  #view-flash:not(.hidden){display:flex;}

  @media(max-width:600px){
    #view-list{grid-template-columns:1fr;padding:12px 14px 40px;}
    .card-verb{font-size:2.4rem;}
    .card-translation{font-size:1.6rem;}
    .tabs{padding:16px 14px 0;}
    .search-wrap{padding:16px 14px 4px;}
    .fc-card{padding:32px 24px;}
  }
</style>
</head>

<div style="background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;">
  <h1 style="font-size:1.25rem;font-weight:700;">100 <span style="color:var(--accent)">Phrasal Verbs</span></h1>
  <div style="font-size:.85rem;color:var(--muted);background:var(--pill-bg);padding:4px 12px;border-radius:20px;" id="header-count">100 verbos</div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-list"  onclick="showTab('list')">📋 Lista</button>
  <button class="tab"        id="tab-flash" onclick="showTab('flash')">🎧 Audio Flashcards</button>
</div>

<!-- LISTA -->
<div class="search-wrap" id="search-section">
  <input type="text" id="searchInput" placeholder="Buscar verbo, traducción o frase..." oninput="filterList()">
</div>
<div id="view-list"></div>

<!-- AUDIO FLASHCARDS -->
<div id="view-flash" class="hidden">

  <!-- Tarjeta primero -->
  <div class="flash-meta">
    <span>Verbo <strong id="fc-num">1</strong> de <strong id="fc-total">100</strong></span>
    <span class="rep-badge">Completados: <strong id="fc-done">0</strong></span>
  </div>

  <div class="flash-progress-bar">
    <div class="flash-progress-fill" id="fc-progress"></div>
  </div>

  <div class="fc-card">
    <div class="card-hint">Phrasal Verb</div>
    <div class="card-verb" id="fc-verb">bring out</div>
    <div class="card-divider"></div>
    <div class="card-translation" id="fc-trans">sacar, revelar</div>
    <div class="card-num-badge" id="fc-badge">#1</div>
    <div class="card-rep-dots" id="fc-dots"></div>
  </div>

  <div class="flash-controls">
    <button class="btn-icon" onclick="prevCard()">◀</button>
    <button class="btn btn-secondary" onclick="restartFlash()">↺ Reiniciar</button>
    <button class="btn btn-primary"   onclick="nextCard()">Siguiente →</button>
    <button class="btn-icon" onclick="nextCard()">▶</button>
  </div>

  <!-- Reproductor abajo -->
  <div class="audio-panel">
    <div class="audio-panel-row">
      <span class="audio-label">Controles</span>
      <div class="audio-btns">
        <button class="abtn" onclick="prevCard()" title="Anterior">◀</button>
        <button class="abtn-play" id="btn-play" onclick="togglePlay()">▶</button>
        <button class="abtn" onclick="stopAudio()" title="Detener">■</button>
        <button class="abtn" onclick="nextCard()" title="Siguiente">▶▶</button>
      </div>
      <span class="rep-info">Rep <span id="fc-rep">1</span> / <span id="fc-rep-max">10</span></span>
    </div>

    <div class="audio-panel-row">
      <span class="audio-label">Velocidad</span>
      <input type="range" class="speed-range" id="speedRange" min="0.5" max="1.2" step="0.1" value="0.8"
             oninput="document.getElementById('speedVal').textContent=parseFloat(this.value).toFixed(1)+'x'">
      <span class="speed-val" id="speedVal">0.8x</span>
    </div>

    <div class="audio-panel-row">
      <span class="audio-label">Repeticiones</span>
      <input type="number" id="repInput" min="1" max="30" value="10"
             style="width:60px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:5px 8px;font-size:.85rem;outline:none;">
      <span style="font-size:.8rem;color:var(--muted)">por verbo</span>
    </div>

    <div class="audio-panel-row">
      <span class="audio-label">Voz</span>
      <select id="voiceSelect" class="audio-select"></select>
    </div>

    <div class="audio-panel-row">
      <span class="audio-label">Auto-avance</span>
      <label class="toggle"><input type="checkbox" id="autoAdvance" checked><span class="slider"></span></label>
      <span style="font-size:.8rem;color:var(--muted)">Avanza solo al terminar repeticiones</span>
    </div>

    <div class="audio-panel-row">
      <span class="audio-label">Aleatorio</span>
      <label class="toggle"><input type="checkbox" id="shuffleToggle"><span class="slider"></span></label>
    </div>
  </div>

</div>

n and practice.", "example_es": "Tú sigue practicando.", "num": 100}];
  var order=[], fcIdx=0, fcRep=0, isPlay=false, tok=0;

  /* LISTA */
  function renderList(list){
    var el=document.getElementById('view-list');
    el.innerHTML='';
    list.forEach(function(v){
      var d=document.createElement('div');
      d.className='verb-card';
      d.innerHTML=
        '<div class="verb-card-top">'+
          '<div class="verb-name">'+v.verb+'</div>'+
          '<div class="verb-num">#'+v.num+'</div>'+
        '</div>'+
        '<div class="verb-trans">'+v.translation+'</div>'+
        '<div class="verb-example">'+ v.example +'</div>'+
        '<div class="verb-example-es">'+v.example_es+'</div>';
      el.appendChild(d);
    });
    document.getElementById('header-count').textContent=list.length+' verbos';
  }
  window.filterList=function(){
    var q=document.getElementById('searchInput').value.toLowerCase();
    renderList(VERBS.filter(function(v){
      return v.verb.toLowerCase().includes(q)||
             v.translation.toLowerCase().includes(q)||
             v.example.toLowerCase().includes(q)||
             v.example_es.toLowerCase().includes(q);
    }));
  };

  /* TABS */
  window.showTab=function(tab){
    var isList=tab==='list';
    document.getElementById('view-list').classList.toggle('hidden',!isList);
    document.getElementById('view-flash').classList.toggle('hidden',isList);
    document.getElementById('search-section').classList.toggle('hidden',!isList);
    document.getElementById('tab-list').classList.toggle('active',isList);
    document.getElementById('tab-flash').classList.toggle('active',!isList);
    if(!isList) renderCard();
  };

  /* ORDEN */
  function buildOrder(){
    order=VERBS.map(function(_,i){return i;});
    if(document.getElementById('shuffleToggle').checked){
      for(var i=order.length-1;i>0;i--){
        var j=Math.floor(Math.random()*(i+1));
        var t=order[i];order[i]=order[j];order[j]=t;
      }
    }
  }

  /* VOCES */
  function loadVoices(){
    var voices=speechSynthesis.getVoices().filter(function(v){
      return v.lang&&v.lang.toLowerCase().startsWith('en');
    });
    var sel=document.getElementById('voiceSelect');
    sel.innerHTML='';
    voices.forEach(function(v,i){
      var o=document.createElement('option');
      o.value=i;
      o.textContent=v.name+' ('+v.lang+')';
      sel.appendChild(o);
    });
    var usIdx=voices.findIndex(function(v){return v.lang.toLowerCase()==='en-us';});
    if(usIdx>=0) sel.value=usIdx;
  }
  speechSynthesis.onvoiceschanged=loadVoices;
  loadVoices();

  function getVoice(){
    var voices=speechSynthesis.getVoices().filter(function(v){
      return v.lang&&v.lang.toLowerCase().startsWith('en');
    });
    return voices[parseInt(document.getElementById('voiceSelect').value)||0]||voices[0]||null;
  }

  /* RENDER */
  function renderCard(){
    var v=VERBS[order[fcIdx]];
    var repMax=parseInt(document.getElementById('repInput').value)||10;

    document.getElementById('fc-verb').textContent   = v.verb;
    document.getElementById('fc-trans').textContent  = v.translation;
    document.getElementById('fc-badge').textContent  = '#'+v.num;
    document.getElementById('fc-num').textContent    = fcIdx+1;
    document.getElementById('fc-total').textContent  = order.length;
    document.getElementById('fc-rep').textContent    = fcRep+1;
    document.getElementById('fc-rep-max').textContent= repMax;
    document.getElementById('fc-done').textContent   = fcIdx;
    document.getElementById('fc-progress').style.width = (fcIdx/order.length*100)+'%';

    var dots=document.getElementById('fc-dots');
    dots.innerHTML='';
    for(var i=0;i<repMax;i++){
      var dot=document.createElement('div');
      dot.className='rep-dot'+(i<fcRep?' done':'');
      dots.appendChild(dot);
    }
    document.getElementById('btn-play').textContent='▶';
  }

  /* AUDIO — inglés para el verbo, español para la traducción */
  function getSpVoice(lang) {
    var all = speechSynthesis.getVoices();
    var matches = all.filter(function(v) {
      return v.lang && v.lang.toLowerCase().startsWith(lang);
    });
    if (lang === 'en') {
      var usIdx = matches.findIndex(function(v) { return v.lang.toLowerCase() === 'en-us'; });
      return matches[usIdx >= 0 ? usIdx : 0] || null;
    }
    if (lang === 'es') {
      // Preferir es-ES o es-MX, cualquier voz en español
      return matches[0] || null;
    }
    return null;
  }

  function speak(){
    var v = VERBS[order[fcIdx]];
    var rate = parseFloat(document.getElementById('speedRange').value) || 0.8;
    var myTok = ++tok;
    isPlay = true;
    document.getElementById('btn-play').textContent = '⏸';
    speechSynthesis.cancel();

    // Utterance 1: verbo en INGLÉS
    var u1 = new SpeechSynthesisUtterance(v.verb);
    u1.lang  = 'en-US';
    u1.rate  = rate;
    var voiceEn = getSpVoice('en');
    if (voiceEn) u1.voice = voiceEn;

    // Utterance 2: traducción en ESPAÑOL
    var u2 = new SpeechSynthesisUtterance(v.translation);
    u2.lang  = 'es-ES';
    u2.rate  = rate;
    var voiceEs = getSpVoice('es');
    if (voiceEs) u2.voice = voiceEs;

    // Al terminar el español → avanzar repetición
    u2.onend = function(){
      if (myTok !== tok) return;
      isPlay = false;
      document.getElementById('btn-play').textContent = '▶';
      fcRep++;
      var repMax = parseInt(document.getElementById('repInput').value) || 10;
      renderCard();
      if (fcRep >= repMax) {
        fcRep = 0;
        if (document.getElementById('autoAdvance').checked) {
          fcIdx = (fcIdx + 1) % order.length;
          if (fcIdx === 0) buildOrder();
          renderCard();
        }
      }
      if (document.getElementById('autoAdvance').checked) {
        setTimeout(speak, 400);
      }
    };

    // Encolar ambos: primero inglés, luego español
    speechSynthesis.speak(u1);
    speechSynthesis.speak(u2);
  }

  window.togglePlay=function(){
    if(isPlay){tok++;speechSynthesis.cancel();isPlay=false;document.getElementById('btn-play').textContent='▶';}
    else speak();
  };
  window.stopAudio=function(){
    tok++;speechSynthesis.cancel();isPlay=false;fcRep=0;
    document.getElementById('btn-play').textContent='▶';
    renderCard();
  };
  window.nextCard=function(){
    tok++;speechSynthesis.cancel();isPlay=false;fcRep=0;
    fcIdx=(fcIdx+1)%order.length;renderCard();
  };
  window.prevCard=function(){
    tok++;speechSynthesis.cancel();isPlay=false;fcRep=0;
    fcIdx=(fcIdx-1+order.length)%order.length;renderCard();
  };
  window.restartFlash=function(){
    tok++;speechSynthesis.cancel();isPlay=false;fcIdx=0;fcRep=0;
    buildOrder();renderCard();
  };

  document.getElementById('shuffleToggle').addEventListener('change',restartFlash);

  /* INIT */
  renderList(VERBS);
  buildOrder();
})();
</script>
